<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Join your partner on Fond</title>
  <!-- Smart App Banner: offers "Open"/"View" for Fond at the top of Safari on iOS. -->
  <meta name="apple-itunes-app" content="app-id=6778048021" />
  <style>
    :root { --clay:#C4623F; --ink:#292520; --bg:#F4F1EA; --card:#FFFFFF; --muted:rgba(41,37,32,0.55); --border:rgba(41,37,32,0.10); }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--ink);
           min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:24px; padding:32px 24px; max-width:380px; width:100%;
            text-align:center; box-shadow:0 6px 24px rgba(58,46,30,0.08); }
    .mark { font-size:40px; font-weight:800; color:var(--clay); letter-spacing:-1px; margin:0 0 4px; }
    h1 { font-size:22px; margin:16px 0 6px; }
    p { color:var(--muted); line-height:1.5; margin:0 0 20px; font-size:15px; }
    .code { display:inline-block; font-size:24px; font-weight:800; color:var(--clay); letter-spacing:2px;
            background:rgba(196,98,63,0.10); border:1px solid rgba(196,98,63,0.22); border-radius:14px; padding:10px 20px; margin-bottom:20px; }
    .btn { display:block; background:var(--clay); color:#fff; text-decoration:none; font-weight:700; font-size:16px;
           padding:15px; border-radius:999px; margin-bottom:12px; }
    .btn.secondary { background:transparent; color:var(--muted); font-weight:600; font-size:14px; padding:8px; }
    .fine { font-size:12px; color:var(--muted); margin-top:8px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="mark">fond.</div>
    <h1>Your partner invited you</h1>
    <p>Fond is a private space for the two of you — your relationship, remembered. Open the app to join.</p>
    <div class="code" id="code" style="display:none"></div>
    <a class="btn" id="openBtn" href="#">Open in Fond</a>
    <a class="btn secondary" id="storeBtn" href="https://apps.apple.com/app/id6778048021">Don't have Fond yet? Get it free</a>
    <p class="fine">If the app doesn't open automatically, tap "Open in Fond" above.</p>
  </div>

  <script>
    (function () {
      var APP_STORE = 'https://apps.apple.com/app/id6778048021';
      var params = new URLSearchParams(location.search);
      // Accept ?code= or the last path segment as the invite code.
      var code = (params.get('code') || location.pathname.split('/').filter(Boolean).pop() || '').toUpperCase();
      var isInviteCode = /^[A-Z0-9-]{3,16}$/.test(code) && code !== 'JOIN';
      var scheme = 'com.hush.couples://join' + (isInviteCode ? ('?code=' + encodeURIComponent(code)) : '');

      if (isInviteCode) {
        var el = document.getElementById('code');
        el.textContent = code;
        el.style.display = 'inline-block';
      }
      document.getElementById('openBtn').setAttribute('href', scheme);
      document.getElementById('storeBtn').setAttribute('href', APP_STORE);

      // Best-effort auto-open of the installed app; if nothing takes over the
      // page within ~1.2s, the app isn't installed — send them to the App Store.
      var start = Date.now();
      var t = setTimeout(function () {
        if (Date.now() - start < 1600 && !document.hidden) location.href = APP_STORE;
      }, 1200);
      window.addEventListener('pagehide', function () { clearTimeout(t); });
      window.addEventListener('blur', function () { clearTimeout(t); });
      // Try the custom scheme (a real device with the app will switch away here;
      // a universal link would already have opened the app before this page loaded).
      location.href = scheme;
    })();
  </script>
</body>
</html>
